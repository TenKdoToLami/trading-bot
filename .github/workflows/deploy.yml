name: Live Tournament & Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1-5' # Run every weekday at midnight UTC to get fresh data

jobs:
  simulate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Set up Python 🐍
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies 📦
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas yfinance

      - name: Run Live Tournament Simulation 🚀
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python tests/run_tournament.py

      - name: Set up Node.js ⬢
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build Visualizer 🔧
        run: |
          cd visualizer
          npm install
          npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: visualizer/dist
          branch: gh-pages
